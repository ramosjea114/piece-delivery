<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PHP Price Cascade Calculator</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f6f8;
        padding: 16px;
        margin: 0;
    }

    .container {
        max-width: 420px;
        margin: auto;
        background: #ffffff;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    label {
        display: block;
        margin-top: 12px;
        margin-bottom: 4px;
        font-size: 14px;
    }

    .input-group {
        position: relative;
    }

    .peso {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        font-weight: bold;
        color: #555;
    }

    input[type="number"] {
        width: 100%;
        padding: 10px 10px 10px 26px;
        font-size: 16px;
        border-radius: 6px;
        border: 1px solid #ccc;
        box-sizing: border-box;
    }

    input[readonly] {
        background-color: #f0f0f0;
    }
</style>
</head>

<body>

<div class="container">
    <h2>PHP Price Calculator</h2>

    <label>Textbox 1 – Base Price</label>
    <div class="input-group">
        <span class="peso">₱</span>
        <input type="number" id="t1" step="0.01" oninput="calculate()" placeholder="Enter price">
    </div>

    <label>Textbox 2 – x 0.80</label>
    <div class="input-group">
        <span class="peso">₱</span>
        <input type="number" id="t2" readonly>
    </div>

    <label>Textbox 3 – x 0.95</label>
    <div class="input-group">
        <span class="peso">₱</span>
        <input type="number" id="t3" readonly>
    </div>

    <label>Textbox 4 – x 0.95</label>
    <div class="input-group">
        <span class="peso">₱</span>
        <input type="number" id="t4" readonly>
    </div>

    <label>Textbox 5 – x 0.95</label>
    <div class="input-group">
        <span class="peso">₱</span>
        <input type="number" id="t5" readonly>
    </div>

    <label>Textbox 6 – x 0.95</label>
    <div class="input-group">
        <span class="peso">₱</span>
        <input type="number" id="t6" readonly>
    </div>

    <label>Textbox 7 – x 0.95</label>
    <div class="input-group">
        <span class="peso">₱</span>
        <input type="number" id="t7" readonly>
    </div>

    <label>Textbox 8 – x 0.95</label>
    <div class="input-group">
        <span class="peso">₱</span>
        <input type="number" id="t8" readonly>
    </div>
</div>

<script>
function round2(value) {
    return Math.round(value * 100) / 100;
}

function calculate() {
    let t1 = parseFloat(document.getElementById("t1").value) || 0;

    let t2 = round2(t1 * 0.8);
    let t3 = round2(t2 * 0.95);
    let t4 = round2(t3 * 0.95);
    let t5 = round2(t4 * 0.95);
    let t6 = round2(t5 * 0.95);
    let t7 = round2(t6 * 0.95);
    let t8 = round2(t7 * 0.95);

    document.getElementById("t2").value = t2.toFixed(2);
    document.getElementById("t3").value = t3.toFixed(2);
    document.getElementById("t4").value = t4.toFixed(2);
    document.getElementById("t5").value = t5.toFixed(2);
    document.getElementById("t6").value = t6.toFixed(2);
    document.getElementById("t7").value = t7.toFixed(2);
    document.getElementById("t8").value = t8.toFixed(2);
}
</script>

</body>
</html>
