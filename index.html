<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PHP Price Calculator</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f6f8;
        padding: 16px;
        margin: 0;
    }

    .container {
        max-width: 420px;
        margin: auto;
        background: #ffffff;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    label {
        display: block;
        margin-top: 12px;
        margin-bottom: 4px;
        font-size: 14px;
    }

    .input-group {
        position: relative;
    }

    .peso {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        font-weight: bold;
        color: #555;
    }

    input[type="number"] {
        width: 100%;
        padding: 10px 10px 10px 26px;
        font-size: 16px;
        border-radius: 6px;
        border: 1px solid #ccc;
        box-sizing: border-box;
    }

    input[readonly] {
        background-color: #f0f0f0;
    }
</style>
</head>

<body>

<div class="container">
    <h2>PHP Price Calculator</h2>

    <!-- Base Price -->
    <label>Textbox 1 – Base Price</label>
    <div class="input-group">
        <span class="peso">₱</span>
        <input
            type="number"
            id="t1"
            step="0.01"
            oninput="calculate()"
            placeholder="Enter price"
        >
    </div>

    <!-- Final Computed Price -->
    <label>Textbox 9 – Final Price</label>
    <div class="input-group">
        <span class="peso">₱</span>
        <input type="number" id="t9" readonly>
    </div>
</div>

<script>
function round2(value) {
    return Math.round(value * 100) / 100;
}

function calculate() {
    const t1 = parseFloat(document.getElementById("t1").value) || 0;

    // Combined cascade factor
    const t9 = round2(t1 * 0.558669836875);

    document.getElementById("t9").value = t9.toFixed(2);
}
</script>

</body>
</html>
